[build]
builder = "nixpacks"
buildCommand = "pip install -r backend/requirements.txt"

[deploy]
startCommand = "cd backend && python main.py"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"

# Required env vars — set in Railway dashboard:
# WA_TOKEN      — Meta Graph API bearer token (WhatsApp Business outreach channel)
# WA_PHONE_ID   — Meta WhatsApp Business phone ID
# OPENAI_API_KEY, MONGO_URL, SECRET_KEY, TWILIO_ACCOUNT_SID, TWILIO_AUTH_TOKEN
