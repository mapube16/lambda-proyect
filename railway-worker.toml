[build]
builder = "dockerfile"

[deploy]
startCommand = "sh -c 'arq worker:WorkerSettings'"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
# No healthcheckPath — the Worker is not an HTTP service.

# Required env vars (set in Railway dashboard for the Worker service):
#   REDIS_URL = ${{Redis.REDIS_URL}}        (or REDIS_PRIVATE_URL)
#   MONGODB_URI = ${{API.MONGODB_URI}}
#   OPENAI_API_KEY = ${{API.OPENAI_API_KEY}}
#   OPENROUTER_API_KEY, GOOGLE_MAPS_API_KEY (whatever the pipeline needs)
# In Railway: create a new service from the same repo, then set
#   Service Settings -> Config file path = /railway-worker.toml
